apiVersion: v1
kind: ConfigMap
metadata:
  name: plane-app-vars
  namespace: plane
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  API_KEY_RATE_LIMIT: 60/minute
  CORS_ALLOWED_ORIGINS: https://plane.kiril.shop
  DEBUG: "0"
  DOCKERIZED: "1"
  GUNICORN_WORKERS: "1"
  MINIO_ENDPOINT_SSL: "0"
  SENTRY_DSN: ""
  SENTRY_ENVIRONMENT: ""
  WEB_URL: https://plane.kiril.shop
