apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/KirilMilosevski/Enterprise-k8s-platform.git
    targetRevision: main
    path: secrets
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

